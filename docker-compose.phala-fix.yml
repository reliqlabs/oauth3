services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oauth3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    image: ghcr.io/reliqlabs/oauth3:feat-contract-5bb39c9
    restart: unless-stopped
    # nvidia-container-runtime is registered in dstack-nvidia-dev guest VM
    # It auto-injects /dev/nvidia* devices and CUDA libs when NVIDIA_VISIBLE_DEVICES is set
    runtime: nvidia
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    volumes:
      # Mount dstack socket for TEE operations
      - /var/run/dstack.sock:/var/run/dstack.sock
      - /usr/lib/libcuda.so.570.172.08:/usr/lib/libcuda.so.570.172.08:ro
      - /usr/lib/libcuda.so.570.172.08:/usr/lib/libcuda.so.1:ro
      - /usr/lib/libnvidia-pkcs11.so.570.172.08:/usr/lib/libnvidia-pkcs11.so.570.172.08:ro
      - /usr/lib/libnvidia-pkcs11-openssl3.so.570.172.08:/usr/lib/libnvidia-pkcs11-openssl3.so.570.172.08:ro
      - /usr/lib/libnvidia-ptxjitcompiler.so.570.172.08:/usr/lib/libnvidia-ptxjitcompiler.so.570.172.08:ro
      - /usr/lib/libnvidia-ptxjitcompiler.so.570.172.08:/usr/lib/libnvidia-ptxjitcompiler.so.1:ro
      # Do NOT mount nvidia libs manually — nvidia-container-runtime handles this
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/oauth3
      APP_BIND_ADDR: ${APP_BIND_ADDR:-0.0.0.0:8080}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      RUST_LOG: ${RUST_LOG:-info,oauth3=info}
      DSTACK_SOCKET: /var/run/dstack.sock
      # SP1 proving mode: cpu (default), cuda (GPU), or network (Succinct prover network)
      SP1_PROVER: ${SP1_PROVER:-cpu}
      NETWORK_PRIVATE_KEY: ${NETWORK_PRIVATE_KEY:-}
      # Tells nvidia-container-runtime which GPUs and capabilities to expose
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Google OAuth provider — endpoints hardcoded to prevent operator redirect attacks
      PROVIDER_GOOGLE_TYPE: oidc
      PROVIDER_GOOGLE_MODE: live
      PROVIDER_GOOGLE_CLIENT_ID: ${PROVIDER_GOOGLE_CLIENT_ID}
      PROVIDER_GOOGLE_CLIENT_SECRET: ${PROVIDER_GOOGLE_CLIENT_SECRET}
      PROVIDER_GOOGLE_ISSUER: https://accounts.google.com
      PROVIDER_GOOGLE_SCOPES: "openid email profile"
      PROVIDER_GOOGLE_API_BASE_URL: https://www.googleapis.com
      LD_LIBRARY_PATH: /nix/store/2fxp204b9jh1s3lpggdlnws44vvzw1w9-openssl-3.4.3/lib:/usr/lib
    ports:
      - "8080:8080"

volumes:
  pgdata:
